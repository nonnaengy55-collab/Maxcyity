<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Massima Città - VR & AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.1.0/dist/aframe-extras.min.js"></script>
    <style>
      /* Stile per il joystick sullo schermo del telefono */
      .a-js- those-controls {
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hit-test, local-floor;">
      
      <a-sky color="#87CEEB"></a-sky>
      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#7CFC00"></a-plane>

      <a-box position="0 2 -5" width="4" height="4" depth="4" color="#FF6347"></a-box>
      <a-cone position="0 5 -5" radius-bottom="3" height="2" color="#8B0000"></a-cone>
      
      <a-box position="-6 5 -10" width="3" height="10" depth="3" color="#4682B4"></a-box>
      
      <a-box position="6 4 -8" width="2" height="8" depth="2" color="#FFD700"></a-box>

      <a-entity id="rig" movement-controls="controls: checkpoint, gamepad, trackpad, keyboard, nipple;" position="0 0 0">
        <a-entity camera position="0 1.6 0" look-controls>
          <a-cursor color="#FF0000" scale="0.5 0.5 0.5"></a-cursor>
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
