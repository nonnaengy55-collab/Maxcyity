<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Città AR - Signor Eccellenza</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ar-button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff5e62, #ff9966);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 1000;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <button id="ar-button">Avvia AR Tramonto</button>

    <script type="module">
        import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let container, camera, scene, renderer;
        let cityGroup;

        init();
        animate();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // LUCI TRAMONTO GTA
            const ambientLight = new THREE.AmbientLight(0x442255, 2.0); 
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffaa44, 4.0); 
            sunLight.position.set(2, 5, 3);
            scene.add(sunLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            const customBtn = document.getElementById('ar-button');
            const officialArButton = ARButton.createButton(renderer);
            
            customBtn.addEventListener('click', () => {
                officialArButton.click();
                customBtn.style.display = 'none';
            });

            // CREIAMO LA CITTÀ
            cityGroup = new THREE.Group();
            
            // Alziamo leggermente la posizione iniziale per farla vedere subito davanti a te
            cityGroup.position.set(0, -0.2, -1.0); 

            const buildingMaterial = new THREE.MeshStandardMaterial({
                color: 0xff7700,
                metalness: 0.6,
                roughness: 0.2
            });

            // Palazzi un po' più grandi così si notano subito
            for (let i = 0; i < 12; i++) {
                const h = Math.random() * 0.5 + 0.3; // Più alti
                const geometry = new THREE.BoxGeometry(0.18, h, 0.18);
                const mesh = new THREE.Mesh(geometry, buildingMaterial);
                
                mesh.position.x = (Math.random() - 0.5) * 0.8;
                mesh.position.z = (Math.random() - 0.5) * 0.8;
                mesh.position.y = h / 2;
                
                cityGroup.add(mesh);
            }

            scene.add(cityGroup);

            // Se tocchi lo schermo, sposta la città esattamente davanti a dove stai guardando
            window.addEventListener('touchstart', () => {
                const direction = new THREE.Vector3();
                camera.getWorldDirection(direction);
                
                // Piazza la città a 1 metro di distanza da dove punta il telefono
                cityGroup.position.copy(camera.position).add(direction.multiplyScalar(1));
                cityGroup.position.y = -0.3; // Altezza stabile vicino al pavimento
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
